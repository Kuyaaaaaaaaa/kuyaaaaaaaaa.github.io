<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Augmentation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tabBar">
    <button class="tabButton" data-tab="dimensions">Generators</button>
    <button class="tabButton" data-tab="settings">Settings</button>
    </div>

    <div id="news-ticker">
    <span id="news-text">
        Welcome to Genesis Augmentations! Endgame is unbalanced, like always....
    </span>
    </div>

    <div class="header">
        <h1>Genesis Augmentation</h1>

        <div class="energy">
            Energy
            <span id="energy">0</span>
        </div>
        
    </div>

<div class="tabPage" id="dimensions">
    <div id="dimensionContainer"></div>
</div>

<div class="tabPage" id="settings">
    
    <div class="saveLoadButtons">
        
        <h2>Settings</h2>

        <button onclick="save(); playSoundLib(clickSound);" id="saveButton">Save</button>
        <button onclick="load()" id="loadButton">Load</button>
        <button onclick="playSoundLib(clickSound)" id="wipeButton">Wipe Save</button>

    </div>

    <div id="wipeConfirm" class="wipeConfirmation" style="display: none;">
        
        <p>Are you sure? This cannot be undone.</p>

        <button onclick="playSoundLib(clickSound)" id="confirmWipe">Yes</button>
        <button onclick="playSoundLib(clickSound)" id="cancelWipe">Cancel</button>
    </div>

</div>


    <script src="js/break_eternity.js"></script>
    <script src="js/data.js"></script>
    <script src="js/player.js"></script>
    <script src="js/save.js"></script>
    <script src="js/production.js"></script>
    <script src="js/formatting.js"></script>
    <script src="js/newsmessages.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/initialization.js"></script>

</body>
</html>
